name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate Android native project)
        working-directory: artifacts/rpw-mobile
        run: pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://rpw-booster-api.onrender.com/api/fb' }}

      - name: Make Gradlew executable
        working-directory: artifacts/rpw-mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/rpw-mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Verify Debug APK exists
        run: ls -lh artifacts/rpw-mobile/android/app/build/outputs/apk/debug/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RPW-BOOSTER-debug-${{ github.sha }}
          path: artifacts/rpw-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: artifacts/rpw-mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: RPW-BOOSTER-release-unsigned-${{ github.sha }}
          path: artifacts/rpw-mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        continue-on-error: true

      - name: Create GitHub Release with Debug APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: RPW BOOSTER v1.5.1 - Build ${{ github.run_number }}
          body: |
            ## RPW BOOSTER Android APK

            **Version:** 1.5.1 (Build ${{ github.run_number }})
            **Commit:** ${{ github.sha }}

            ### Download
            - `app-debug.apk` — Debug build (install directly, no signing needed)

            ### Install Instructions
            1. Download `app-debug.apk`
            2. On your Android device, enable **Install unknown apps** in settings
            3. Open the downloaded APK and install
          files: |
            artifacts/rpw-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
